# P2P Mesh Network - Prometheus Configuration
# Scrapes metrics from the control plane API and export targets.
#
# TLS RECOMMENDATIONS:
# - All scrape targets below use http:// scheme by default.
# - For defense-in-depth in production, consider switching scrape targets
#   to HTTPS where the target service supports it.
# - See individual target comments for specific HTTPS guidance.

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

  external_labels:
    cluster: p2p-mesh
    environment: production

# Alerting rules
rule_files:
  - "alerts/*.yml"

scrape_configs:
  # Auth Service
  # SECURITY: Consider switching to HTTPS in production (defense-in-depth)
  - job_name: "mesh-auth"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "auth-service:8000"
        labels:
          service: "auth"
          component: "microservice"

  # User Service
  # SECURITY: Consider switching to HTTPS in production (defense-in-depth)
  - job_name: "mesh-user"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "user-service:8000"
        labels:
          service: "user"
          component: "microservice"

  # Signaling Service
  # SECURITY: Consider switching to HTTPS in production (defense-in-depth)
  - job_name: "mesh-signaling"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "signaling-service:8000"
        labels:
          service: "signaling"
          component: "microservice"

  # Relay Service
  # SECURITY: Consider switching to HTTPS in production (defense-in-depth)
  - job_name: "mesh-relay-svc"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "relay-service:8000"
        labels:
          service: "relay"
          component: "microservice"

  # Usage Service
  # SECURITY: Consider switching to HTTPS in production (defense-in-depth)
  - job_name: "mesh-usage"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "usage-service:8000"
        labels:
          service: "usage"
          component: "microservice"

  # Node exporter (if installed on relay hosts)
  # SECURITY: Consider switching to HTTPS in production (defense-in-depth)
  - job_name: "node"
    static_configs:
      - targets:
          - "relay:9100"
        labels:
          service: "relay"

  # Prometheus self-monitoring
  # SECURITY: Consider switching to HTTPS in production (defense-in-depth)
  - job_name: "prometheus"
    static_configs:
      - targets:
          - "localhost:9090"

  # Loki self-monitoring
  # SECURITY: Consider switching to HTTPS in production (defense-in-depth)
  - job_name: "loki"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "loki:3100"
        labels:
          service: "loki"

  # Jaeger self-monitoring
  # SECURITY: Consider switching to HTTPS in production (defense-in-depth)
  - job_name: "jaeger"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "jaeger:16686"
        labels:
          service: "jaeger"

# Alertmanager (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]
