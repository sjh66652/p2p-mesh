auth_enabled: false

# SECURITY: Authentication is currently disabled (auth_enabled: false).
# In production, you MUST enable authentication to prevent unauthorized
# access to log data. Options:
#   1. Set auth_enabled: true and configure Loki's multi-tenant auth
#      (requires X-Scope-OrgID header from a reverse proxy).
#   2. Deploy an authenticating reverse proxy (nginx, oauth2-proxy, etc.)
#      in front of Loki's HTTP/gRPC ports.
#   3. For HTTP basic auth, configure a reverse proxy with auth_request.

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /tmp/loki
  storage:
    filesystem:
      chunks_directory: /tmp/loki/chunks
      rules_directory: /tmp/loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093
