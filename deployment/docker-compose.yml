# P2P Mesh Network - Docker Compose (Development / Small Production)
# Full stack: API + PostgreSQL + Redis + Nginx + Relay Node
# For large-scale production, use Kubernetes manifests in ./k8s/

version: "3.8"

services:
  # ============================================================
  # API Gateway — Nginx reverse proxy with SSL termination
  # ============================================================
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mesh-net

  # ============================================================
  # Control Plane API — FastAPI application
  # ============================================================
  api:
    build:
      context: ../control-plane
      dockerfile: ../deployment/Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://mesh:mesh_pass@postgres:5432/p2p_mesh
      - DATABASE_URL_SYNC=postgresql://mesh:mesh_pass@postgres:5432/p2p_mesh
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mesh-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ============================================================
  # Worker — Background tasks (traffic aggregation, cleanup)
  # ============================================================
  worker:
    build:
      context: ../control-plane
      dockerfile: ../deployment/Dockerfile.api
    command: >
      python -c "
      import asyncio;
      from app.services.relay_service import start_relay_health_check;
      async def main():
          task = start_relay_health_check();
          await task
      asyncio.run(main())
      "
    environment:
      - DATABASE_URL=postgresql+asyncpg://mesh:mesh_pass@postgres:5432/p2p_mesh
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mesh-net

  # ============================================================
  # PostgreSQL 16 — Primary database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mesh
      POSTGRES_PASSWORD: mesh_pass
      POSTGRES_DB: p2p_mesh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesh -d p2p_mesh"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mesh-net

  # ============================================================
  # Redis 7 — Cache, signaling, rate limiting
  # ============================================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mesh-net

  # ============================================================
  # Relay Node — High-performance UDP packet forwarder (Rust)
  # ============================================================
  relay:
    build:
      context: ../data-plane
      dockerfile: ../deployment/Dockerfile.relay
    ports:
      - "51821:51821/udp"
    environment:
      - API_URL=http://api:8000
      - RELAY_ID=relay-primary
      - REGION=default
      - HEARTBEAT_INTERVAL=30
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mesh-net

  # ============================================================
  # Prometheus — Metrics collection
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped
    networks:
      - mesh-net

  # ============================================================
  # Grafana — Metrics dashboards
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - mesh-net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  mesh-net:
    driver: bridge
