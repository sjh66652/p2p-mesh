# P2P Mesh Network - Docker Compose (Development / Small Production)
# Full stack: API + PostgreSQL + Redis + Nginx + Relay Node
# For large-scale production, use Kubernetes manifests in ./k8s/
#
# Security: All secrets come from .env file. An .env.example is provided.
# Copy .env.example to .env and change values before first launch.

services:
  # ============================================================
  # API Gateway — Nginx reverse proxy with SSL termination
  # ============================================================
  nginx:
    image: nginx:1.25.5-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mesh-net

  # ============================================================
  # Control Plane API — FastAPI application
  # ============================================================
  api:
    build:
      context: ../control-plane
      dockerfile: ../deployment/Dockerfile.api
    init: true
    # Bind only to localhost — Nginx is the only public entry point.
    # Prevents direct external access to the API bypassing rate limits,
    # trusted-host checks, and request-size limits configured in Nginx.
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://mesh:${POSTGRES_PASSWORD}@postgres:5432/p2p_mesh
      - DATABASE_URL_SYNC=postgresql://mesh:${POSTGRES_PASSWORD}@postgres:5432/p2p_mesh
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - RELAY_AUTH_TOKEN=${RELAY_AUTH_TOKEN}
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mesh-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ============================================================
  # Worker — Background tasks (traffic aggregation, cleanup)
  # ============================================================
  worker:
    build:
      context: ../control-plane
      dockerfile: ../deployment/Dockerfile.api
    init: true
    command: python -m app.worker
    # Worker has no HTTP server — override the API's HTTP healthcheck
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'app.worker' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    environment:
      - DATABASE_URL=postgresql+asyncpg://mesh:${POSTGRES_PASSWORD}@postgres:5432/p2p_mesh
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - mesh-net

  # ============================================================
  # PostgreSQL 16 — Primary database
  # ============================================================
  postgres:
    image: postgres:16.4-alpine
    environment:
      POSTGRES_USER: mesh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: p2p_mesh
    # Only expose to localhost for development debugging
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mesh -d p2p_mesh"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - mesh-net

  # ============================================================
  # Redis 7 — Cache, signaling, rate limiting
  # ============================================================
  redis:
    image: redis:7.4-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    # Use REDISCLI_AUTH env var instead of -a flag to avoid password
    # appearing in process listing (/proc/*/cmdline)
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      REDISCLI_AUTH: ${REDIS_PASSWORD}
    restart: unless-stopped
    networks:
      - mesh-net

  # ============================================================
  # STUN Server — NAT traversal address discovery (Rust)
  # ============================================================
  stun:
    build:
      context: ../data-plane
      dockerfile: ../deployment/Dockerfile.stun
    ports:
      - "3478:3478/udp"
    restart: unless-stopped
    networks:
      - mesh-net

  # ============================================================
  # Relay Node — High-performance UDP packet forwarder (Rust)
  # ============================================================
  relay:
    build:
      context: ../data-plane
      dockerfile: ../deployment/Dockerfile.relay
    ports:
      - "51821:51821/udp"
    environment:
      - API_URL=http://api:8000
      - RELAY_AUTH_TOKEN=${RELAY_AUTH_TOKEN}
      - RELAY_ID=${RELAY_ID:-relay-primary}
      - REGION=default
      - RELAY_PORT=51821
      - HEARTBEAT_INTERVAL=30
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - mesh-net

  # ============================================================
  # Prometheus — Metrics collection (dev only: localhost access)
  # ============================================================
  prometheus:
    image: prom/prometheus:v2.55.0
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped
    networks:
      - mesh-net

  # ============================================================
  # Grafana — Metrics dashboards
  # ============================================================
  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      # If empty, Grafana won't start (enforced for security)
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - mesh-net

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  mesh-net:
    driver: bridge
