# P2P Mesh Network - Control Plane API Deployment
# Production Kubernetes manifest
#
# SECURITY: Secrets must be created separately via:
#   kubectl create secret generic mesh-secrets \
#     --namespace=p2p-mesh \
#     --from-literal=jwt-secret=$(openssl rand -hex 32) \
#     --from-literal=db-password=<secure-password> \
#     --from-literal=redis-password=<secure-password> \
#     --from-literal=relay-auth-token=$(openssl rand -hex 32)
#
# Never commit real secrets to this file.
# Use a secret management solution (Sealed Secrets, Vault, etc.) in production.

apiVersion: v1
kind: Namespace
metadata:
  name: p2p-mesh

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mesh-config
  namespace: p2p-mesh
data:
  host: "0.0.0.0"
  port: "8000"
  debug: "false"
  log-level: "INFO"
  stun-servers: "stun.l.google.com:19302,stun1.l.google.com:19302"
  rate-limit-per-minute: "120"
  relay-cleanup-interval: "300"
  relay-max-load: "0.8"
  free-plan-bandwidth-mbps: "1"
  # Full DATABASE_URL is constructed from individual secret parts at startup
  db-host: "postgres-cluster"
  db-port: "5432"
  db-name: "p2p_mesh"
  db-user: "mesh"
  redis-host: "redis-cluster"
  redis-port: "6379"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mesh-api
  namespace: p2p-mesh
  labels:
    app: mesh-api
    component: control-plane
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mesh-api
  template:
    metadata:
      labels:
        app: mesh-api
        component: control-plane
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: mesh-api
                topologyKey: kubernetes.io/hostname
      containers:
        - name: api
          image: p2p-mesh-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            # Construct DATABASE_URL from ConfigMap + Secret parts
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: db-host
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: db-port
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: db-name
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: db-user
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mesh-secrets
                  key: db-password
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: redis-host
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: redis-port
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mesh-secrets
                  key: redis-password
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: DATABASE_URL_SYNC
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mesh-secrets
                  key: jwt-secret
            - name: RELAY_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mesh-secrets
                  key: relay-auth-token
          envFrom:
            - configMapRef:
                name: mesh-config
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: mesh-api
  namespace: p2p-mesh
spec:
  type: ClusterIP
  selector:
    app: mesh-api
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mesh-api-hpa
  namespace: p2p-mesh
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mesh-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
