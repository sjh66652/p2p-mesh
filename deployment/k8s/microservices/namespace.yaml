apiVersion: v1
kind: Namespace
metadata:
  name: p2p-mesh
---
# SECURITY: The mesh-secrets Secret must be created BEFORE deploying.
# Use one of the following methods:
#   1. kubectl create secret generic mesh-secrets --namespace p2p-mesh \
#      --from-literal=postgres-password=<value> \
#      --from-literal=redis-password=<value> \
#      --from-literal=jwt-secret=<value> \
#      --from-literal=internal-api-key=<value> \
#      --from-literal=relay-auth-token=<value>
#   2. Or use External Secrets Operator / Sealed Secrets
#
# This file does NOT contain real secrets — it documents what's expected.
# See deployment/.env.example for the environment variable names to source from.
