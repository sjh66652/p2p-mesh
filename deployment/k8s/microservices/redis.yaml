# P2P Mesh Network - Redis Deployment
# In-memory cache, signaling pub/sub, and rate-limit counters.
# Uses a password from the mesh-secrets Secret.
#
# SECURITY NOTE: Password exposure via /proc/*/cmdline
# The --requirepass $(REDIS_PASSWORD) below passes the password as a
# command-line argument, making it visible to any process on the node
# that can read /proc/*/cmdline (e.g., via ps aux).
#
# Recommended mitigations (choose one):
#   1. Use Kubernetes Secrets mounted as files instead of env vars:
#      mount the password at /etc/redis/conf/redis.conf and use
#      `redis-server /etc/redis/conf/redis.conf` with `requirepass` inside.
#   2. Redis 6.2+ supports ACL files -- use a ConfigMap-mounted ACL file
#      via --aclfile and reference the Secret as a mounted volume.
#   3. As a lighter alternative, write a startup script that reads the
#      env var and generates a redis.conf with requirepass at runtime,
#      then starts redis-server with that config file (not inline args).

apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: p2p-mesh
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: p2p-mesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          command:
            - redis-server
            - --appendonly
            - "yes"
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - allkeys-lru
            - --requirepass
            - "$(REDIS_PASSWORD)"
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mesh-secrets
                  key: redis-password
            - name: REDISCLI_AUTH
              valueFrom:
                secretKeyRef:
                  name: mesh-secrets
                  key: redis-password
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "--no-auth-warning", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
