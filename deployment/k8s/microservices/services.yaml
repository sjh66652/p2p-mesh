# ============================================================
# Signaling Service — WebSocket signaling for P2P connections
# Uses sticky sessions (ClientIP) for WebSocket affinity.
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: signaling-service
  namespace: p2p-mesh
spec:
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600
  selector:
    app: signaling-service
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: signaling-service
  namespace: p2p-mesh
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: signaling-service
  template:
    metadata:
      labels:
        app: signaling-service
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: signaling-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: signaling-service
          image: ${DOCKER_REGISTRY:-yourorg}/p2p-mesh-signaling:${IMAGE_TAG:-latest}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mesh-secrets
                  key: jwt-secret
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mesh-secrets
                  key: internal-api-key
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
