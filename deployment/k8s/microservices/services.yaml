# P2P Mesh Network - Microservices Deployments and Services
# 5 HTTP microservices + 1 background worker.
# Each service connects to shared PostgreSQL and Redis instances.

---
# ============================================================
# Auth Service — Authentication, registration, token management
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: p2p-mesh
spec:
  selector:
    app: auth-service
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: p2p-mesh
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: auth-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: auth-service
          image: ${DOCKER_REGISTRY:-yourorg}/p2p-mesh-auth:${IMAGE_TAG:-latest}
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@$(POSTGRES_HOST):$(POSTGRES_PORT)/$(POSTGRES_DB)"
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST):$(REDIS_PORT)/0"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mesh-secrets
                  key: jwt-secret
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mesh-secrets
                  key: internal-api-key
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mesh-secrets
                  key: postgres-password
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: POSTGRES_DB
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mesh-secrets
                  key: redis-password
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: DEBUG
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: LOG_LEVEL
            - name: USAGE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: mesh-config
                  key: USAGE_SERVICE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30

