# ============================================================
# Worker — Background tasks (usage aggregation, cleanup)
# No HTTP server — no Service, no readiness probe.
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: p2p-mesh
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
