# P2P Mesh Network - Production Nginx (SSL + HSTS + Security Headers)
# Microservices architecture — routes by path prefix to individual services.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"duration":$request_time,'
        '"upstream":"$upstream_addr",'
        '"ua":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log json;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    server_tokens off;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=120r/m;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

    # ---- Upstream Microservice Clusters ----

    upstream auth_cluster {
        least_conn;
        server auth-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream user_cluster {
        least_conn;
        server user-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream signaling_cluster {
        ip_hash;
        server signaling-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream relay_cluster {
        least_conn;
        server relay-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream usage_cluster {
        least_conn;
        server usage-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # HTTP → HTTPS 重定向
    server {
        listen 80;
        server_name mesh.yourdomain.com;
        return 301 https://$host$request_uri;
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name mesh.yourdomain.com;

        # SSL 证书（certbot Let's Encrypt）
        ssl_certificate /etc/letsencrypt/live/mesh.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/mesh.yourdomain.com/privkey.pem;

        # SSL 强化
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_dhparam /etc/nginx/dhparam.pem;

        # 安全头部
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # ---- Shared Proxy Settings ----
        proxy_http_version 1.1;
        proxy_buffering off;

        # ---- Auth Service ----
        location /api/v1/auth/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://auth_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ---- Login — 严格限流 ----
        location /api/v1/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://auth_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ---- User Service ----
        location /api/v1/users/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://user_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ---- Signaling Service (WebSocket — 长连接) ----
        location /api/v1/ws/ {
            limit_req zone=api_limit burst=50 nodelay;
            proxy_pass http://signaling_cluster;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ---- Signaling REST endpoints ----
        location /api/v1/signaling/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://signaling_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ---- Relay Service ----
        location /api/v1/relay/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://relay_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ---- Usage Service ----
        location /api/usage/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://usage_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ---- Health Check (routes to usage-service) ----
        location /health {
            proxy_pass http://usage_cluster;
            proxy_set_header Host $host;
        }

        # 禁止访问隐藏文件
        location ~ /\. {
            deny all;
            return 404;
        }

        # Deny access to sensitive paths
        location ~ /(vendor|node_modules|\.git|\.env|config\.json) {
            deny all;
            return 404;
        }
    }
}
