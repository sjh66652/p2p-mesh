# P2P Mesh Network - Nginx API Gateway Configuration
# Provides: SSL termination, rate limiting, WebSocket proxy, load balancing

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"duration":$request_time,'
        '"upstream":"$upstream_addr",'
        '"ua":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log json;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Security
    server_tokens off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstream backend cluster
    upstream backend_cluster {
        least_conn;
        server api:8000 weight=1 max_fails=3 fail_timeout=30s;
        # Add more replicas for scaling:
        # server api-2:8000 weight=1 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # ---- HTTP Server ----
    server {
        listen 80;
        server_name _;

        # Redirect HTTP to HTTPS (when TLS is enabled)
        # return 301 https://$host$request_uri;

        # Connection limit
        limit_conn conn_limit 50;

        # ---- API Endpoints ----
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://backend_cluster;
            proxy_http_version 1.1;

            # Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;

            # Buffering
            proxy_buffering off;
            proxy_buffer_size 4k;
            proxy_buffers 8 16k;
        }

        # ---- WebSocket Signaling ----
        location /api/v1/ws/ {
            limit_req zone=api_limit burst=30 nodelay;

            proxy_pass http://backend_cluster;
            proxy_http_version 1.1;

            # WebSocket upgrade
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long-lived connections
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }

        # ---- Login - stricter rate limit ----
        location /api/v1/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Health Check ----
        location /health {
            proxy_pass http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ---- Metrics ----
        location /metrics {
            proxy_pass http://backend_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ---- Deny direct access to internals ----
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }
    }

    # ---- HTTPS Server (enable when TLS certificates are available) ----
    # server {
    #     listen 443 ssl http2;
    #     server_name mesh.example.com;
    #
    #     ssl_certificate /etc/nginx/ssl/mesh.crt;
    #     ssl_certificate_key /etc/nginx/ssl/mesh.key;
    #
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # ... same location blocks as HTTP ...
    # }
}
