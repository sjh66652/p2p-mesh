# P2P Mesh Network - Nginx API Gateway Configuration
# Provides: SSL termination, rate limiting, WebSocket proxy, load balancing

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format json escape=json '{'
        '"time":"$time_iso8601",'
        '"remote":"$remote_addr",'
        '"method":"$request_method",'
        '"path":"$request_uri",'
        '"status":$status,'
        '"bytes":$body_bytes_sent,'
        '"duration":$request_time,'
        '"upstream":"$upstream_addr",'
        '"ua":"$http_user_agent"'
    '}';

    access_log /var/log/nginx/access.log json;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;
    types_hash_max_size 2048;

    # Security
    server_tokens off;

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ---- Upstream Microservice Clusters ----

    # Auth service — authentication and authorization
    upstream auth_cluster {
        least_conn;
        server auth-service:8000;
        keepalive 16;
    }

    # User service — user profile and device management
    upstream user_cluster {
        least_conn;
        server user-service:8000;
        keepalive 16;
    }

    # Signaling service — WebSocket signaling for P2P connections (sticky sessions)
    upstream signaling_cluster {
        ip_hash;
        server signaling-service:8000;
        keepalive 16;
    }

    # Relay service — relay node management and traffic reporting
    upstream relay_cluster {
        least_conn;
        server relay-service:8000;
        keepalive 16;
    }

    # Usage service — resource quota management and abuse prevention
    upstream usage_cluster {
        least_conn;
        server usage-service:8000;
        keepalive 16;
    }

    # ---- HTTP Server ----
    server {
        listen 80;
        server_name _;

        # Redirect HTTP to HTTPS (when TLS is enabled)
        # return 301 https://$host$request_uri;

        # Connection limit
        limit_conn conn_limit 50;

        # Request body size limit
        client_max_body_size 1m;

        # ---- Shared Proxy Settings ----
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_buffer_size 4k;
        proxy_buffers 8 16k;

        # ---- Auth Service ----
        location /api/v1/auth/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth_cluster;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ---- Login — stricter rate limit ----
        location /api/v1/auth/login {
            limit_req zone=login_limit burst=5 nodelay;
            proxy_pass http://auth_cluster;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ---- User Service ----
        location /api/v1/users/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://user_cluster;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ---- Signaling Service (WebSocket - long-lived connections) ----
        location /api/v1/ws/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://signaling_cluster;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ---- Signaling REST endpoints ----
        location /api/v1/signaling/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://signaling_cluster;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ---- Relay Service ----
        location /api/v1/relay/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://relay_cluster;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ---- Usage Service ----
        location /api/usage/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://usage_cluster;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # ---- Health Check (routes to usage-service) ----
        location /health {
            proxy_pass http://usage_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ---- Metrics (routes to usage-service) ----
        location /metrics {
            # Restrict metrics access to internal network
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://usage_cluster;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # ---- Deny direct access to internals ----
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
            return 404;
        }

        # ---- Deny access to sensitive paths ----
        location ~ /(vendor|node_modules|\.git|\.env|config\.json) {
            deny all;
            return 404;
        }
    }

    # ---- HTTPS Server (enable when TLS certificates are available) ----
    # server {
    #     listen 443 ssl http2;
    #     server_name mesh.example.com;
    #
    #     ssl_certificate /etc/nginx/ssl/mesh.crt;
    #     ssl_certificate_key /etc/nginx/ssl/mesh.key;
    #
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     # ... same location blocks as HTTP ...
    # }
}
