# P2P Mesh Network - CI/CD Pipeline
# 推送 tag 时自动构建镜像并部署到服务器
# Microservices architecture — builds 6 service images via matrix strategy.

name: Build and Deploy

on:
  push:
    tags:
      - 'v*'           # v1.0.0 触发生产部署
    branches:
      - main           # main 分支触发测试环境
  workflow_dispatch:    # 手动触发

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME_API: yourorg/p2p-mesh-api
  IMAGE_NAME_RELAY: yourorg/p2p-mesh-relay

jobs:
  # ---- 代码质量检查 ----
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          cd control-plane
          pip install -r requirements.txt
          pip install ruff mypy bandit pip-audit

      - name: Lint Python
        run: |
          cd control-plane
          ruff check app/

      - name: Python type check
        run: |
          cd control-plane
          mypy app/ --ignore-missing-imports

      - name: Python security scan (bandit)
        run: |
          cd control-plane
          bandit -r app/ -ll

      - name: Python dependency audit
        run: |
          cd control-plane
          pip-audit

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Lint Rust
        run: |
          cd data-plane
          cargo clippy --all-targets -- -D warnings

      - name: Test Rust
        run: |
          cd data-plane
          cargo test

      - name: Rust dependency audit
        run: |
          cd data-plane
          cargo install cargo-audit
          cargo audit

  # ---- 构建并推送镜像（矩阵策略：6 个微服务） ----
  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        service:
          - service-name: auth-service
            context: services/auth-service
            dockerfile: services/auth-service/Dockerfile
          - service-name: user-service
            context: services/user-service
            dockerfile: services/user-service/Dockerfile
          - service-name: signaling-service
            context: services/signaling-service
            dockerfile: services/signaling-service/Dockerfile
          - service-name: relay-service
            context: services/relay-service
            dockerfile: services/relay-service/Dockerfile
          - service-name: usage-service
            context: services/usage-service
            dockerfile: services/usage-service/Dockerfile
          - service-name: worker
            context: services/worker
            dockerfile: services/worker/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build & Push ${{ matrix.service.service-name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/p2p-mesh-${{ matrix.service.service-name }}:latest
            ${{ env.DOCKER_REGISTRY }}/p2p-mesh-${{ matrix.service.service-name }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # TODO: Enable Trivy vulnerability scanning before production
      # Uncomment the step below to scan container images for known CVEs.
      # Install Trivy via aquasecurity/trivy-action which runs the scanner
      # on the built image and outputs results in SARIF format for GitHub
      # Security Code Scanning alerts.
      #
      # Examples:
      #   - name: Scan container images with Trivy
      #     uses: aquasecurity/trivy-action@master
      #     with:
      #       image-ref: '${{ env.DOCKER_REGISTRY }}/p2p-mesh-${{ matrix.service.service-name }}:latest'
      #       format: 'sarif'
      #       output: 'trivy-results-${{ matrix.service.service-name }}.sarif'
      #
      #   - name: Upload Trivy results to GitHub Security
      #     uses: github/codeql-action/upload-sarif@v3
      #     with:
      #       sarif_file: 'trivy-results-${{ matrix.service.service-name }}.sarif'
      #       category: 'trivy-${{ matrix.service.service-name }}'

  # ---- 构建并推送 Relay image (Rust data-plane, separate from microservices) ----

  # ---- 构建并推送 Relay image (Rust data-plane, separate from microservices) ----
  build-and-push-relay:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build & Push Relay image
        uses: docker/build-push-action@v5
        with:
          context: ./data-plane
          file: ./deployment/Dockerfile.relay
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/p2p-mesh-relay:latest
            ${{ env.DOCKER_REGISTRY }}/p2p-mesh-relay:${{ steps.version.outputs.VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---- 部署到服务器 ----
  deploy:
    needs: [build-and-push, build-and-push-relay]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/p2p-mesh/deployment
            docker compose -f docker-compose.microservices.prod.yml pull
            docker compose -f docker-compose.microservices.prod.yml up -d --remove-orphans
            docker image prune -af
